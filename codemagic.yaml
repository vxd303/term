workflows:
  build-termux:
    name: Build Termux APK
    max_build_duration: 30
    environment:
      java: 11
    scripts:
      - name: Install required Android SDK components including NDK
        script: |
          wget https://raw.githubusercontent.com/codemagic-ci-cd/codemagic-scripts/master/android/android-sdk-tools.sh
          chmod +x android-sdk-tools.sh
          ./android-sdk-tools.sh --ndk 21.4.7075529

      - name: Make gradlew executable
        script: chmod +x ./gradlew

      - name: Build APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
